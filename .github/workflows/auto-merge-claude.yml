@"
name: Auto-merge claude branch to main

on:
  push:
    branches:
      - claude/**

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: `${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge into main
        run: |
          git checkout main
          git merge --no-ff `${{ github.ref_name }} -m "chore: auto-merge `${{ github.ref_name }} into main"
          git push origin main
"@ | Out-File -FilePath C:\t3\hashpop-main\.github\workflows\auto-merge-claude.yml -Encoding utf8