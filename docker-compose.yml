version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: hedera
      POSTGRES_PASSWORD: hedera
      POSTGRES_DB: marketplace
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hedera"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://hedera:hedera@db:5432/marketplace
      MIRROR_URL: https://testnet.mirrornode.hedera.com
      MARKETPLACE_ADDRESS: ${MARKETPLACE_ADDRESS}
      ESCROW_ADDRESS: ${ESCROW_ADDRESS}
      AUCTION_HOUSE_ADDRESS: ${AUCTION_HOUSE_ADDRESS}
      HEDERA_RPC_URL: ${HEDERA_RPC_URL:-https://testnet.hashio.io/api}
      PORT: 4000
      LOG_LEVEL: info
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,http://127.0.0.1:3000}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_ENDPOINT: ${S3_ENDPOINT}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_HEDERA_RPC: ${NEXT_PUBLIC_HEDERA_RPC:-https://testnet.hashio.io/api}
      NEXT_PUBLIC_MARKETPLACE_ADDRESS: ${NEXT_PUBLIC_MARKETPLACE_ADDRESS}
      NEXT_PUBLIC_ESCROW_ADDRESS: ${NEXT_PUBLIC_ESCROW_ADDRESS}
      NEXT_PUBLIC_AUCTION_HOUSE_ADDRESS: ${NEXT_PUBLIC_AUCTION_HOUSE_ADDRESS}
      NEXT_PUBLIC_WC_PROJECT_ID: ${NEXT_PUBLIC_WC_PROJECT_ID}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
